<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>관용 표현 MASTER 되기</title>
    <style>
        body { font-family: 'Malgun Gothic', sans-serif; background-color: #f4f7f6; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .container { background: white; padding: 30px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); width: 600px; max-width: 90%; text-align: center; }
        h1 { color: #2c3e50; }
        h2 { color: #34495e; }
        .hidden { display: none; }
        
        /* 버튼 스타일 */
        button { background-color: #3498db; color: white; border: none; padding: 12px 20px; margin: 8px; border-radius: 5px; cursor: pointer; font-size: 16px; transition: 0.3s; font-weight: bold; }
        button:hover { background-color: #2980b9; }
        .btn-danger { background-color: #e74c3c; }
        .btn-danger:hover { background-color: #c0392b; }
        .btn-ready { background-color: #2ecc71; width: 100%; font-size: 18px; margin-top: 15px; }
        
        /* 입력창 및 셀렉트 박스 */
        input[type="text"], select { padding: 12px; width: 80%; font-size: 16px; margin: 10px 0; border: 2px solid #bdc3c7; border-radius: 5px; text-align: center; }
        
        /* 박스 및 텍스트 레이아웃 */
        .info-box { background-color: #ecf0f1; padding: 20px; border-radius: 8px; margin-bottom: 20px; text-align: left; }
        .score-board { font-size: 20px; font-weight: bold; color: #27ae60; margin-bottom: 15px; }
        .options { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .options button { margin: 0; height: 60px; font-size: 15px; }
        
        /* 타이포그래피 정렬 및 크기 일치 (매우 중요) */
        .proverb-text { font-size: 24px; font-weight: bold; color: #2c3e50; vertical-align: middle; }
        .proverb-blank { font-size: 24px; font-weight: bold; color: #e74c3c; display: inline-block; min-width: 100px; border-bottom: 3px solid #e74c3c; text-align: center; vertical-align: middle; margin: 0 5px; }
        
        /* 교사용 화면 모둠 리스트 */
        .team-list { display: flex; justify-content: space-around; margin-top: 20px; flex-wrap: wrap; }
        .team-card { background: #fff; border: 2px solid #bdc3c7; border-radius: 8px; padding: 15px; width: 40%; margin-bottom: 15px; }
        .team-card h3 { margin-top: 0; font-size: 20px; }
        .player-item { font-size: 16px; margin: 5px 0; color: #2c3e50; font-weight: bold; }
    </style>
</head>
<body>

<div class="container" id="app">
    <div id="screen-main">
        <h1>🏆 관용 표현 MASTER</h1>
        <p>어떤 모드로 학습할까요?</p>
        <button onclick="showScreen('screen-practice')">✏️ 연습 모드</button>
        <button onclick="startQuiz()">⏱️ 기록 도전</button>
        <hr style="border: 1px solid #ecf0f1; margin: 20px 0;">
        <button class="btn-ready" style="background-color: #f39c12;" onclick="showScreen('screen-lobby')">🔥 경쟁 도전 (학생용)</button>
        <button style="background-color: #95a5a6; margin-top: 20px;" onclick="initTeacherDashboard()">👨‍🏫 교사용 대시보드</button>
    </div>

    <div id="screen-lobby" class="hidden">
        <h2>🔥 경쟁 도전 대기실</h2>
        <div class="info-box" style="text-align: center;">
            <p>이름과 모둠을 선택하고 준비 완료를 누르세요!</p>
            <input type="text" id="player-name" placeholder="이름 (예: 홍길동)">
            <select id="player-team">
                <option value="1.⭐">1모둠 ⭐</option>
                <option value="2.❤️">2모둠 ❤️</option>
                <option value="3.🎈">3모둠 🎈</option>
                <option value="4.🍀">4모둠 🍀</option>
            </select>
            <button class="btn-ready" onclick="joinGame()">준비 완료!</button>
        </div>
        <p id="lobby-status" style="font-weight: bold; color: #2980b9;"></p>
        <button class="btn-danger" onclick="goHome()">🏠 뒤로 가기</button>
    </div>

    <div id="screen-teacher" class="hidden">
        <h2>👨‍🏫 교사용 대시보드</h2>
        <p>학생들의 접속 현황을 확인하고 게임을 시작하세요.</p>
        <div class="team-list" id="teacher-team-list">
            </div>
        <button class="btn-ready" onclick="alert('게임 시작 기능은 다음 단계에서 구현됩니다!')">🚀 전체 게임 시작</button>
        <button class="btn-danger" onclick="goHome()">🏠 메인으로</button>
    </div>

    <div id="screen-practice" class="hidden">
        <h2>✏️ 연습 모드 (준비중)</h2>
        <button class="btn-danger" onclick="goHome()">🏠 메인으로</button>
    </div>
    <div id="screen-quiz" class="hidden">
        <h2>⏱️ 기록 도전 (준비중)</h2>
        <button class="btn-danger" onclick="goHome()">🏠 메인으로</button>
    </div>
</div>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

<script>
    // 선생님의 파이어베이스 설정값 적용
    const firebaseConfig = {
      apiKey: "AIzaSyBxkFKJQF3TaYP_024apdVQs4T86FAM08Q",
      authDomain: "proverb-game-6582d.firebaseapp.com",
      databaseURL: "https://proverb-game-6582d-default-rtdb.firebaseio.com",
      projectId: "proverb-game-6582d",
      storageBucket: "proverb-game-6582d.firebasestorage.app",
      messagingSenderId: "303291371598",
      appId: "1:303291371598:web:4e9ccb071bfa879a50f31f"
    };

    // 파이어베이스 초기화
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    // 화면 전환 함수
    function showScreen(screenId) {
        document.querySelectorAll('.container > div').forEach(div => div.classList.add('hidden'));
        document.getElementById(screenId).classList.remove('hidden');
    }

    function goHome() {
        showScreen('screen-main');
    }

    // 학생 로비 - 접속 기능
    function joinGame() {
        const name = document.getElementById('player-name').value.trim();
        const team = document.getElementById('player-team').value;

        if (name === "") {
            alert("이름을 입력해주세요!");
            return;
        }

        // 파이어베이스 실시간 데이터베이스에 참가자 정보 쓰기
        db.ref('lobby/' + name).set({
            name: name,
            team: team,
            status: "ready"
        }).then(() => {
            document.getElementById('lobby-status').innerText = "✅ 준비 완료! 선생님이 시작할 때까지 기다려주세요.";
            document.getElementById('player-name').disabled = true;
            document.getElementById('player-team').disabled = true;
        }).catch((error) => {
            console.error("데이터 저장 실패: ", error);
            alert("접속에 실패했습니다. 다시 시도해주세요.");
        });
    }

    // 교사용 대시보드 - 실시간 참가자 목록 불러오기
    function initTeacherDashboard() {
        showScreen('screen-teacher');
        const teamListDiv = document.getElementById('teacher-team-list');

        // 파이어베이스에서 'lobby' 경로의 데이터 변화를 실시간으로 감지
        db.ref('lobby').on('value', (snapshot) => {
            teamListDiv.innerHTML = ""; // 기존 목록 초기화
            const data = snapshot.val();
            
            if (!data) {
                teamListDiv.innerHTML = "<p>아직 접속한 학생이 없습니다.</p>";
                return;
            }

            // 모둠별로 학생 분류하기
            const teams = { "1.⭐": [], "2.❤️": [], "3.🎈": [], "4.🍀": [] };
            for (let key in data) {
                let player = data[key];
                if(teams[player.team]) {
                    teams[player.team].push(player.name);
                }
            }

            // 화면에 모둠별 카드 그리기
            for (let teamName in teams) {
                let card = document.createElement('div');
                card.className = 'team-card';
                card.innerHTML = `<h3>${teamName} (${teams[teamName].length}명)</h3>`;
                
                teams[teamName].forEach(name => {
                    let p = document.createElement('div');
                    p.className = 'player-item';
                    p.innerText = `✔️ ${name}`;
                    card.appendChild(p);
                });
                teamListDiv.appendChild(card);
            }
        });
    }
</script>

</body>
</html>
