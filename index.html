<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>관용 표현 MASTER 되기</title>
    <style>
        body { font-family: 'Malgun Gothic', sans-serif; background-color: #f4f7f6; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .container { background: white; padding: 25px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); width: 700px; max-width: 95%; text-align: center; max-height: 90vh; overflow-y: auto; }
        h1 { color: #2c3e50; } h2 { color: #34495e; margin-bottom: 10px; }
        .hidden { display: none; }
        
        button { background-color: #3498db; color: white; border: none; padding: 12px 20px; margin: 8px; border-radius: 5px; cursor: pointer; font-size: 16px; transition: 0.3s; font-weight: bold; }
        button:hover { background-color: #2980b9; }
        button:disabled { background-color: #bdc3c7; cursor: not-allowed; }
        .btn-danger { background-color: #e74c3c; } .btn-danger:hover { background-color: #c0392b; }
        .btn-ready { background-color: #2ecc71; width: 100%; font-size: 18px; margin-top: 15px; }
        .btn-choice { width: 48%; height: 60px; font-size: 15px; margin: 1%; white-space: normal; }
        
        input[type="text"], select { padding: 12px; width: 80%; font-size: 16px; margin: 10px 0; border: 2px solid #bdc3c7; border-radius: 5px; text-align: center; }
        
        .info-box { background-color: #ecf0f1; padding: 20px; border-radius: 8px; margin-bottom: 20px; text-align: left; line-height: 1.5; }
        .score-board { font-size: 20px; font-weight: bold; color: #27ae60; margin-bottom: 15px; display: flex; justify-content: space-between; }
        .progress-text { font-size: 18px; color: #8e44ad; font-weight: bold; }
        
        .team-list, .rank-list { display: flex; justify-content: space-around; flex-wrap: wrap; margin-top: 15px; }
        .team-card, .rank-card { background: #fff; border: 2px solid #bdc3c7; border-radius: 8px; padding: 15px; width: 45%; margin-bottom: 15px; text-align: left; box-sizing: border-box; }
        .team-card h3 { margin-top: 0; font-size: 18px; border-bottom: 2px solid #ecf0f1; padding-bottom: 5px; }
        
        /* 타자 연습용 텍스트 정렬 */
        .proverb-text { font-size: 22px; font-weight: bold; color: #2c3e50; }
        .missed-list { text-align: left; background: #ffeaa7; padding: 15px; border-radius: 8px; font-weight: bold; margin-bottom: 15px; }
    </style>
</head>
<body>

<div class="container" id="app">
    <div id="screen-main">
        <h1>🏆 관용 표현 MASTER (속담편)</h1>
        <p>어떤 모드로 학습할까요?</p>
        <button onclick="startPractice()">✏️ 1. 연습 모드 (무한 타자)</button>
        <button onclick="startRecord()">⏱️ 2. 기록 도전 (개인 랭킹)</button>
        <hr style="border: 1px solid #ecf0f1; margin: 20px 0;">
        <button class="btn-ready" style="background-color: #f39c12;" onclick="showScreen('screen-lobby')">🔥 3. 경쟁 도전 접속 (학생용)</button>
        <button style="background-color: #95a5a6; margin-top: 20px;" onclick="initTeacherDashboard()">👨‍🏫 교사용 대시보드</button>
    </div>

    <div id="screen-practice" class="hidden">
        <h2>✏️ 연습 모드</h2>
        <div class="info-box">
            <p><strong>상황:</strong> <span id="prac-example"></span></p>
            <p><strong>뜻:</strong> <span id="prac-meaning"></span></p>
        </div>
        <p class="proverb-text" id="prac-question"></p>
        <input type="text" id="prac-input" placeholder="빈칸 채우기 (띄어쓰기 무시)" onkeypress="if(event.key==='Enter') checkPractice()">
        <br>
        <button onclick="checkPractice()">정답 확인</button>
        <button class="btn-danger" onclick="endPractice()">끝내기 (오답 확인)</button>
        <p id="prac-feedback" style="font-weight: bold; margin-top: 10px;"></p>
    </div>
    <div id="screen-practice-result" class="hidden">
        <h2>📊 연습 모드 결과</h2>
        <div id="prac-missed-area"></div>
        <button onclick="goHome()">🏠 메인으로</button>
    </div>

    <div id="screen-record" class="hidden">
        <h2>⏱️ 기록 도전 (25문제)</h2>
        <div
