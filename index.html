<!DOCTYPE html>
<html lang="ko">
<head>

    <title>관용 표현 MASTER 되기</title>
    <style>

        h1 { color: #2c3e50; } h2 { color: #34495e; margin-bottom: 10px; }
        .hidden { display: none; }
        
        button { background-color: #3498db; color: white; border: none; padding: 12px 20px; margin: 8px; border-radius: 5px; cursor: pointer; font-size: 16px; transition: 0.3s; font-weight: bold; }
        button:hover { background-color: #2980b9; }
        button:disabled { background-color: #bdc3c7; cursor: not-allowed; }
        .btn-danger { background-color: #e74c3c; } .btn-danger:hover { background-color: #c0392b; }
        .btn-ready { background-color: #2ecc71; width: 100%; font-size: 18px; margin-top: 15px; }
        .btn-choice { width: 48%; height: 60px; font-size: 15px; margin: 1%; white-space: normal; }
        
        input[type="text"], select { padding: 12px; width: 80%; font-size: 16px; margin: 10px 0; border: 2px solid #bdc3c7; border-radius: 5px; text-align: center; }
        
        .info-box { background-color: #ecf0f1; padding: 20px; border-radius: 8px; margin-bottom: 20px; text-align: left; line-height: 1.5; }
        .score-board { font-size: 20px; font-weight: bold; color: #27ae60; margin-bottom: 15px; display: flex; justify-content: space-between; }
        .progress-text { font-size: 18px; color: #8e44ad; font-weight: bold; }
        
        .team-list, .rank-list { display: flex; justify-content: space-around; flex-wrap: wrap; margin-top: 15px; }
        .team-card, .rank-card { background: #fff; border: 2px solid #bdc3c7; border-radius: 8px; padding: 15px; width: 45%; margin-bottom: 15px; text-align: left; box-sizing: border-box; }
        .team-card h3 { margin-top: 0; font-size: 18px; border-bottom: 2px solid #ecf0f1; padding-bottom: 5px; }
        
        /* 타자 연습용 텍스트 정렬 */
        .proverb-text { font-size: 22px; font-weight: bold; color: #2c3e50; }
        .missed-list { text-align: left; background: #ffeaa7; padding: 15px; border-radius: 8px; font-weight: bold; margin-bottom: 15px; }

</head>
<body>

    <div id="screen-practice" class="hidden">

        { p: "빈 수레가 요란하다", m: "실속 없는 사람이 겉으로 더 떠든다.", e: "공부 하나도 안 한 애가 시험 쉽다고 큰소리치네. ( )더니.", i: "ㅂ ㅅㄹㄱ ㅇㄹㅎㄷ" },
        { p: "사공이 많으면 배가 산으로 간다", m: "간섭하는 사람이 많으면 일이 제대로 되기 어렵다.", e: "서로 자기 아이디어만 맞다고 우기니, ( )고 결론이 안 나.", i: "ㅅㄱㅇ ㅁㅇㅁ ㅂㄱ ㅅㅇㄹ ㄱㄷ" },
        { p: "소 잃고 외양간 고친다", m: "일이 이미 잘못된 뒤에는 손을 써도 소용이 없다.", e: "컴퓨터 고장 나고 나서야 백업하려 하다니, ( ) 격이야.", i: "ㅅ ㅇㄱ ㅇㅇㄱ ㄱㅊㄷ" },
        { p: "시작이 반이다", m: "무슨 일이든 시작하기가 어렵지 일단 시작하면 끝마치기는 쉽다.", e: "운동하기 귀찮았는데 헬스장에 오니 벌써 다 한 기분이야. ( ).", i: "ㅅㅈㅇ ㅂㅇㄷ" },
        { p: "우물 안 개구리", m: "견문이 좁아 세상 형편을 모르는 사람.", e: "동네에서만 1등 하더니 전국 대회 가서는 꼴찌를 했어. ( )였지.", i: "ㅇㅁ ㅇ ㄱㄱㄹ" },
        { p: "천리길도 한 걸음부터", m: "무슨 일이든 그 시작이 중요하다.", e: "영어 공부 막막하지만 매일 단어 하나씩 외워보자. ( )라고 하잖아.", i: "ㅊㄹㄱㄷ ㅎ ㄱㅇㅂㅌ" }
    ];

    /* 유틸리티 함수 */
    function shuffle(array) { return array.sort(() => Math.random() - 0.5); }
    function strip(str) { return str.replace(/\s/g, ''); } // 띄어쓰기 무시
    function showScreen(id) {
        document.querySelectorAll('.container > div').forEach(d => d.classList.add('hidden'));
        document.getElementById(id).classList.remove('hidden');
    }
    function goHome() { 
        clearInterval(recTimerObj); 
        showScreen('screen-main'); 
    }
    function confirmExit() {
        if(confirm("게임을 중간에 나가면 점수가 저장되지 않습니다. 나가시겠습니까?")) goHome();
    }

    /* ==========================================
       3. 모드 1: 연습 모드 (무한 타자)
       ========================================== */
    let pracIdx = 0;
    let missedProverbs = new Set();
    
    function startPractice() {
        pracIdx = 0; missedProverbs.clear();
        shuffle(proverbs);
        loadPracQ();
        showScreen('screen-practice');
    }
    function loadPracQ() {
        const item = proverbs[pracIdx % proverbs.length];
        document.getElementById('prac-example').innerText = item.e;
        document.getElementById('prac-meaning').innerText = item.m;
        
        let words = item.p.split(" ");
        let hint = words.slice(0, Math.ceil(words.length / 2)).join(" ");
        document.getElementById('prac-question').innerText = hint + " _________";
        document.getElementById('prac-input').value = "";
        document.getElementById('prac-feedback').innerText = "";
        document.getElementById('prac-input').focus();
    }
    function checkPractice() {
        const item = proverbs[pracIdx % proverbs.length];
        const user = document.getElementById('prac-input').value;
        if(strip(user) === "" || !strip(item.p).includes(strip(user))) {
            document.getElementById('prac-feedback').style.color = "red";
            document.getElementById('prac-feedback').innerText = "틀렸습니다. 다시 시도해보세요!";
            missedProverbs.add(item.p + " - " + item.m);
        } else {
            document.getElementById('prac-feedback').style.color = "green";
            document.getElementById('prac-feedback').innerText = `정답! (${item.p})`;
            pracIdx++;
            setTimeout(loadPracQ, 800);
        }
    }
    function endPractice() {
        showScreen('screen-practice-result');
        const area = document.getElementById('prac-missed-area');
        if(missedProverbs.size === 0) {
            area.innerHTML = "<p>틀린 문제가 없습니다! 완벽해요!</p>";
        } else {
            area.innerHTML = "<h3>내가 헷갈렸던 속담들</h3>";
            missedProverbs.forEach(txt => {
                area.innerHTML += `<div class="missed-list">${txt}</div>`;
            });
        }
    }

    /* ==========================================
       4. 모드 2: 기록 도전 (개인전 25제, 콤보/시간 보너스)
       ========================================== */
    let recQList = [];
    let recIdx = 0;
    let recScore = 0;
    let recCombo = 0;
    let recTimeLeft = 15;
    let recTimerObj;

    function startRecord() {
        recQList = shuffle([...proverbs]).slice(0, 25); // 25문제 추출
        recIdx = 0; recScore = 0; recCombo = 0;
        showScreen('screen-record');
        loadRecQ();
    }
    function loadRecQ() {
        if(recIdx >= recQList.length) return endRecord();
        
        const item = recQList[recIdx];
        document.getElementById('rec-progress').innerText = `${recIdx+1}/25`;
        document.getElementById('rec-score').innerText = recScore;
        document.getElementById('rec-combo').innerText = recCombo;
        document.getElementById('rec-example').innerText = item.e;
        
        let opts = [item.p];
        let pool = shuffle([...proverbs]);
        for(let p of pool) { if(p.p !== item.p && opts.length < 4) opts.push(p.p); }
        opts = shuffle(opts);
        
        const optDiv = document.getElementById('rec-options');
        optDiv.innerHTML = "";
        opts.forEach(o => {
            let b = document.createElement('button');
            b.className = 'btn-choice';
            b.innerText = o;
            b.onclick = () => checkRecordAns(o, item.p);
            optDiv.appendChild(b);
        });

        recTimeLeft = 15;
        document.getElementById('rec-timer').innerText = recTimeLeft;
        clearInterval(recTimerObj);
        recTimerObj = setInterval(() => {
            recTimeLeft--;
            document.getElementById('rec-timer').innerText = recTimeLeft;
            if(recTimeLeft <= 0) checkRecordAns("", item.p); // 시간초과 오답처리
        }, 1000);
    }
    function checkRecordAns(user, correct) {
        clearInterval(recTimerObj);
        if(user === correct) {
            recScore += 5 + recTimeLeft + (recCombo * 2);
            recCombo++;
        } else {
            recScore = Math.max(0, recScore - 5);
            recCombo = 0;
        }
        recIdx++;
        loadRecQ();
    }
    function endRecord() {
        showScreen('screen-record-result');
        document.getElementById('rec-final-score').innerText = `${recScore}점`;
        document.getElementById('rec-stats').innerText = "최고 기록을 명예의 전당에 저장합니다!";
        
        // 파이어베이스에 개인 최고기록 갱신 로직
        let pName = prompt("명예의 전당에 기록할 이름을 입력하세요:");
        if(pName) {
            db.ref('hallOfFame/' + pName).once('value', snap => {
                let oldScore = snap.val() ? snap.val().score : 0;
                if(recScore > oldScore) {
                    db.ref('hallOfFame/' + pName).set({ score: recScore, date: new Date().toLocaleDateString() });
                    alert("기록이 갱신되었습니다!");
                }
            });
        }
    }

    /* ==========================================
       5. 모드 3: 경쟁 도전 (모둠/개인, 20제 동기화)
       ========================================== */
    let myName = "";
    let myTeam = "";
    let isTeacher = false;
    let multiQList = [];
    let multiTimerObj;

    // [로비] 학생 접속
    function joinMultiGame() {
        myName = document.getElementById('player-name').value.trim();
        myTeam = document.getElementById('player-team').value;
        if (!myName) return alert("이름을 입력해주세요!");

        document.getElementById('btn-join').disabled = true;
        document.getElementById('lobby-status').innerText = "✅ 준비 완료! 선생님을 기다립니다...";
        db.ref('lobby/' + myName).set({ name: myName, team: myTeam, score: 0 });
    }

    // [로비] 교사 대시보드
    function initTeacherDashboard() {
        isTeacher = true;
        showScreen('screen-teacher');
        db.ref('lobby').on('value', snap => {
            const list = document.getElementById('teacher-team-list');
            list.innerHTML = "";
            let data = snap.val() || {};
            let teams = {};
            Object.values(data).forEach(p => {
                if(!teams[p.team]) teams[p.team] = [];
                teams[p.team].push(p.name);
            });
            for(let t in teams) {
                let c = document.createElement('div'); c.className = 'team-card';
                c.innerHTML = `<h3>${t} (${teams[t].length}명)</h3>` + teams[t].map(n => `<div>✔️ ${n}</div>`).join('');
                list.appendChild(c);
            }
        });
    }

    // [교사] 전체 게임 시작 및 문제 생성
    function startMultiGame() {
        // 문제 20개 세팅: 1~5 초성/뜻(주관식), 6~15 예문(객관식), 16~20 예문(주관식)
        let pool = shuffle([...proverbs]);
        multiQList = pool.slice(0, 20);
        db.ref('gameState').set({
            status: 'playing', qIndex: 0, 
            quizData: multiQList,
            answers: {}, showAns: false
        });
    }
    function resetMultiGame() { db.ref('lobby').remove(); db.ref('gameState').set({status:'waiting'}); alert("초기화 완료"); }

    // [공통] 실시간 게임 상태 동기화 리스너
    db.ref('gameState').on('value', snap => {
        let state = snap.val();
        if(!state) return;

        if (state.status === 'playing') {
            showScreen('screen-multi-quiz');
            document.getElementById('multi-header').innerText = isTeacher ? "👨‍🏫 선생님 화면 (모니터링)" : "🔥 게임 진행 중!";
            document.getElementById('multi-teacher-controls').classList.toggle('hidden', !isTeacher);
            
            let qIdx = state.qIndex;
            if(qIdx >= 20) return processFinalResult();

            let qData = state.quizData[qIdx];
            document.getElementById('multi-progress').innerText = `문제 ${qIdx+1}/20`;
            
            // 문제 렌더링
            let area = document.getElementById('multi-q-area');
            let inpArea = document.getElementById('multi-input-area');
            let optArea = document.getElementById('multi-options-area');
            document.getElementById('multi-wait-msg').innerText = "";
            document.getElementById('multi-input').value = "";
            document.getElementById('multi-input').disabled = false;
            document.getElementById('multi-submit-btn').disabled = false;
            inpArea.classList.add('hidden'); optArea.classList.add('hidden');

            if(qIdx < 5) {
                // 초성+뜻 (주관식)
                area.innerHTML = `<p><strong>뜻:</strong> ${qData.m}</p><p style="font-size:30px; letter-spacing:5px;">${qData.i}</p>`;
                if(!isTeacher) { inpArea.classList.remove('hidden'); document.getElementById('multi-input').focus(); }
            } else if (qIdx < 15) {
                // 예문 (4지선다)
                area.innerHTML = `<p>${qData.e}</p>`;
                if(!isTeacher) {
                    optArea.classList.remove('hidden'); optArea.innerHTML = "";
                    let opts = [qData.p];
                    let pPool = shuffle([...proverbs]);
                    for(let p of pPool) { if(p.p !== qData.p && opts.length < 4) opts.push(p.p); }
                    shuffle(opts).forEach(o => {
                        let b = document.createElement('button'); b.className = 'btn-choice'; b.innerText = o;
                        b.onclick = () => submitMultiChoice(o); optArea.appendChild(b);
                    });
                }
            } else {
                // 예문 (주관식 전체작성)
                area.innerHTML = `<p style="color:#c0392b;">* 상황에 맞는 속담을 정확히 적으세요!</p><p>${qData.e}</p>`;
                if(!isTeacher) { inpArea.classList.remove('hidden'); document.getElementById('multi-input').focus(); }
            }

            // 제출 카운트 및 정답 공개 처리
            let ansCount = state.answers ? Object.keys(state.answers).length : 0;
            if(isTeacher) document.getElementById('multi-submit-count').innerText = ansCount;

            if(state.showAns) {
                // 정답 공개 (교사는 전체 정답자 리스트, 학생은 맞/틀 결과만)
                document.getElementById('multi-timer-text').innerText = "결과 확인 중...";
                inpArea.classList.add('hidden'); optArea.classList.add('hidden');
                
                if(isTeacher) {
                    let rev = document.getElementById('multi-answer-reveal');
                    rev.classList.remove('hidden');
                    let corrects = [], wrongs = [];
                    for(let k in state.answers) {
                        if(state.answers[k].isCorrect) corrects.push(k); else wrongs.push(k);
                    }
                    rev.innerHTML = `<h3>정답: ${qData.p}</h3>
                        <p style="color:green">맞힌 학생: ${corrects.join(', ') || '없음'}</p>
                        <p style="color:red">틀린/미제출: ${wrongs.join(', ') || '없음'}</p>`;
                } else {
                    let myAns = state.answers && state.answers[myName] ? state.answers[myName].isCorrect : false;
                    document.getElementById('multi-wait-msg').innerText = myAns ? "⭕ 정답입니다! (+10점)" : `❌ 틀렸습니다! (정답: ${qData.p})`;
                    document.getElementById('multi-wait-msg').style.color = myAns ? "green" : "red";
                }
            } else {
                // 타이머 시작 (교사만 카운트다운을 돌리고, 60초 지나면 강제 채점)
                if(isTeacher) document.getElementById('multi-answer-reveal').classList.add('hidden');
                let tLeft = 60;
                document.getElementById('multi-timer').innerText = tLeft;
                clearInterval(multiTimerObj);
                multiTimerObj = setInterval(() => {
                    tLeft--; document.getElementById('multi-timer').innerText = tLeft;
                    if(isTeacher && tLeft <= 0) forceEvaluate(qIdx);
                }, 1000);
            }

        } else if (state.status === 'finished') {
            processFinalResult();
        } else {
            goHome();
        }
    });

    // [학생] 답안 제출
    function submitMultiAnswer() {
        let ans = document.getElementById('multi-input').value;
        if(strip(ans) === "") return;
        submitToDB(ans);
    }
    function submitMultiChoice(ans) { submitToDB(ans); }
    function submitToDB(ans) {
        db.ref('gameState').once('value', snap => {
            let state = snap.val();
            let correctAns = state.quizData[state.qIndex].p;
            let isCorrect = strip(ans) === strip(correctAns);
            
            db.ref(`gameState/answers/${myName}`).set({ answer: ans, isCorrect: isCorrect });
            document.getElementById('multi-input-area').classList.add('hidden');
            document.getElementById('multi-options-area').classList.add('hidden');
            document.getElementById('multi-wait-msg').innerText = "제출 완료! 다른 학생들을 기다리는 중...";
            document.getElementById('multi-wait-msg').style.color = "#2980b9";
        });
    }

    // [교사] 모든 참가자 제출 감지 -> 즉시 채점
    db.ref('gameState/answers').on('value', snap => {
        if(!isTeacher) return;
        db.ref('lobby').once('value', lobbySnap => {
            let totalPlayers = Object.keys(lobbySnap.val() || {}).length;
            let currentAnswers = Object.keys(snap.val() || {}).length;
            if(totalPlayers > 0 && currentAnswers >= totalPlayers) {
                db.ref('gameState').once('value', gSnap => forceEvaluate(gSnap.val().qIndex));
            }
        });
    });

    // [교사] 채점 및 점수 부여 로직 (연속점수 없음, 깔끔하게 +10점)
    let isEvaluating = false;
    function forceEvaluate(qIdx) {
        if(isEvaluating) return; isEvaluating = true;
        clearInterval(multiTimerObj);
        
        db.ref('gameState/answers').once('value', snap => {
            let answers = snap.val() || {};
            db.ref('lobby').once('value', lSnap => {
                let lobby = lSnap.val() || {};
                let updates = {};
                for(let player in lobby) {
                    if(answers[player] && answers[player].isCorrect) {
                        updates[`lobby/${player}/score`] = lobby[player].score + 10;
                    }
                }
                // 점수 업데이트 후 정답 공개 뷰로 전환
                db.ref().update(updates).then(() => {
                    db.ref('gameState').update({ showAns: true });
                    // 5초 뒤 다음 문제로 이동
                    setTimeout(() => {
                        let nextQ = qIdx + 1;
                        if(nextQ >= 20) {
                            db.ref('gameState').update({ status: 'finished' });
                        } else {
                            db.ref('gameState').update({ qIndex: nextQ, showAns: false, answers: null });
                        }
                        isEvaluating = false;
                    }, 5000);
                });
            });
        });
    }

    // [공통] 최종 결과 통계 화면
    function processFinalResult() {
        showScreen('screen-multi-result');
        db.ref('lobby').once('value', snap => {
            let data = snap.val() || {};
            let players = [];
            let teamScores = {};
            let teamCounts = {};

            for(let key in data) {
                let p = data[key];
                players.push(p);
                if(p.team !== "개인전 👤") {
                    teamScores[p.team] = (teamScores[p.team] || 0) + p.score;
                    teamCounts[p.team] = (teamCounts[p.team] || 0) + 1;
                }
            }

            // 모둠 평균 계산 및 정렬
            let teamAverages = [];
            for(let t in teamScores) {
                teamAverages.push({ team: t, avg: Math.round(teamScores[t] / teamCounts[t]) });
            }
            teamAverages.sort((a,b) => b.avg - a.avg);

            let tHTML = "";
            teamAverages.forEach((t, i) => { tHTML += `<div class="rank-card"><h3>${i+1}등. ${t.team}</h3><h2>평균 ${t.avg}점</h2></div>`; });
            document.getElementById('res-team-rank').innerHTML = tHTML || "<p>참여한 모둠이 없습니다.</p>";

            // 개인 점수 정렬
            players.sort((a,b) => b.score - a.score);
            let pHTML = "";
            players.forEach((p, i) => { 
                let medal = i===0?"🥇":i===1?"🥈":i===2?"🥉":`${i+1}위`;
                pHTML += `<div style="font-size:18px; margin:5px 0; border-bottom:1px solid #eee; width:80%; padding:5px;">
                          <strong>${medal}</strong> ${p.name} (${p.team}) - <strong>${p.score}점</strong></div>`; 
            });
            document.getElementById('res-indiv-rank').innerHTML = pHTML;
        });
    }
</script>
</body>
</html>
